<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owner Dashboard - Safar</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#f4f4f4; }
nav{ background:#111; color:white; padding:15px 50px; display:flex; justify-content:space-between; align-items:center; }
nav h2{ color:orange; }
nav button{ padding:8px 15px; background:orange; border:none; color:white; cursor:pointer; border-radius:5px; margin-left:8px; }
.container{ padding:40px 60px; }
.section{ margin-bottom:44px; }
.section h3{ font-size:20px; margin-bottom:16px; border-left:4px solid orange; padding-left:10px; }

/* Forms */
.add-form{ background:white; padding:24px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.08); }
.form-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.form-group{ margin-bottom:14px; }
.form-group label{ display:block; font-size:13px; color:#555; margin-bottom:5px; font-weight:600; }
.form-group input, .form-group select, .form-group textarea{
    width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; font-size:14px; font-family:Arial,sans-serif;
}
.form-group input:focus, .form-group select:focus{ outline:none; border-color:orange; }
.btn-add{ padding:12px 24px; background:orange; border:none; color:white; border-radius:6px; cursor:pointer; font-size:15px; font-weight:bold; }
.btn-add:hover{ background:darkorange; }
.btn-add:disabled{ background:#aaa; cursor:not-allowed; }
.form-msg{ margin-top:10px; font-size:14px; font-weight:bold; }
.form-msg.ok{ color:green; }
.form-msg.err{ color:red; }

/* Cards */
.card{ background:white; padding:20px; margin-bottom:15px; border-radius:10px; box-shadow:0 5px 15px rgba(0,0,0,0.08); }
.card h4{ margin-bottom:8px; font-size:16px; }
.card p{ margin:4px 0; color:#555; font-size:14px; }
.status{ display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:bold; }
.status.Pending{ background:#fef3c7; color:#b45309; }
.status.Accepted{ background:#d1fae5; color:#065f46; }
.status.Rejected{ background:#fee2e2; color:#991b1b; }
.status.PaidConfirmed, .status.Paid{ background:#dbeafe; color:#1e40af; }
.status.CounterOffered{ background:#ede9fe; color:#5b21b6; }
.action-btns{ margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
.btn-accept{ padding:7px 16px; background:#10b981; border:none; color:white; border-radius:5px; cursor:pointer; font-size:13px; }
.btn-reject{ padding:7px 16px; background:#ef4444; border:none; color:white; border-radius:5px; cursor:pointer; font-size:13px; }
.btn-counter{ padding:7px 16px; background:#8b5cf6; border:none; color:white; border-radius:5px; cursor:pointer; font-size:13px; }
.btn-del{ padding:6px 14px; background:#ef4444; border:none; color:white; border-radius:5px; cursor:pointer; font-size:13px; }

/* Counter-offer inline panel */
.counter-panel{ display:none; background:#f5f3ff; border:1px solid #c4b5fd; border-radius:8px; padding:14px; margin-top:12px; }
.counter-panel.show{ display:block; }
.counter-panel label{ font-size:13px; color:#555; display:block; margin-bottom:4px; }
.counter-panel input{ padding:8px; border:1px solid #c4b5fd; border-radius:5px; font-size:14px; width:160px; }
.counter-panel textarea{ padding:8px; border:1px solid #c4b5fd; border-radius:5px; font-size:13px; width:100%; margin-top:8px; height:60px; }
.counter-send-btn{ padding:8px 18px; background:#7c3aed; border:none; color:white; border-radius:5px; cursor:pointer; font-size:13px; margin-top:10px; }

/* Trip & Hotel listing rows */
.item-row{ background:white; padding:16px; margin-bottom:12px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.07); display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px; }
.item-row h4{ margin-bottom:4px; }
.item-row p{ font-size:13px; color:#666; }
.empty{ color:#888; font-style:italic; padding:10px 0; }
.spinner{ display:inline-block; width:13px; height:13px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; margin-right:6px; vertical-align:middle; }
@keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<nav>
    <h2>Owner Dashboard</h2>
    <div>
        <button onclick="window.location.href='explore.html'">Browse</button>
        <button onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container">

    <!-- ══════════════════════════════════════════════════
         SECTION 1 — ADD HOTEL LISTING
    ═══════════════════════════════════════════════════ -->
    <div class="section">
        <h3>🏨 Add a Hotel Listing</h3>
        <div class="add-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Hotel Name</label>
                    <input type="text" id="hotelName" placeholder="e.g. Snow View Resort">
                </div>
                <div class="form-group">
                    <label>City</label>
                    <select id="hotelCity">
                        <option value="">-- Select City --</option>
                        <option>Chopta</option><option>Dehradun</option><option>Devprayag</option>
                        <option>Dhanaulti</option><option>Dharchula</option><option>Rishikesh</option>
                        <option>Harshil</option><option>Kalpa</option><option>Mussoorie</option><option>Sangla</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price per Night (₹)</label>
                    <input type="number" id="hotelPrice" placeholder="e.g. 3500" min="0">
                </div>
                <div class="form-group">
                    <label>Image filename (from frontend/)</label>
                    <input type="text" id="hotelImage" placeholder="e.g. p1.jpg">
                </div>
            </div>
            <div class="form-group">
                <label>Short Description</label>
                <textarea id="hotelDesc" placeholder="e.g. Cozy resort with mountain views…" style="height:60px;"></textarea>
            </div>
            <div class="form-msg" id="hotelMsg"></div>
            <button class="btn-add" id="addHotelBtn" onclick="addHotel()">+ List Hotel</button>
        </div>
    </div>

    <!-- My Hotel Listings -->
    <div class="section">
        <h3>Your Hotel Listings</h3>
        <div id="myHotelsContainer"><p class="empty">Loading your hotels…</p></div>
    </div>

    <!-- ══════════════════════════════════════════════════
         SECTION 2 — ADD TRIP / PACKAGE
    ═══════════════════════════════════════════════════ -->
    <div class="section">
        <h3>🎒 Add a Travel Package</h3>
        <div class="add-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Package Title</label>
                    <input type="text" id="tripTitle" placeholder="e.g. Chopta Weekend Escape">
                </div>
                <div class="form-group">
                    <label>Location / City</label>
                    <input type="text" id="tripLocation" placeholder="e.g. Chopta">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="tripPrice" placeholder="e.g. 6999" min="0">
                </div>
                <div class="form-group">
                    <label>Image filename</label>
                    <input type="text" id="tripImage" placeholder="e.g. chopta.webp">
                </div>
            </div>
            <div class="form-msg" id="tripMsg"></div>
            <button class="btn-add" id="addTripBtn" onclick="addTrip()">+ Add Package</button>
        </div>
    </div>

    <!-- My Trips -->
    <div class="section">
        <h3>Your Travel Packages</h3>
        <div id="myTripsContainer"><p class="empty">Loading your packages…</p></div>
    </div>

    <!-- ══════════════════════════════════════════════════
         SECTION 3 — BOOKING REQUESTS (with bargain/counter)
    ═══════════════════════════════════════════════════ -->
    <div class="section">
        <h3>📋 Hotel Booking Requests</h3>
        <div id="requestsContainer"><p class="empty">Loading requests…</p></div>
    </div>

</div>

<script>
    const API = 'http://localhost:3000/api';
    const currentUser = JSON.parse(sessionStorage.getItem('loggedInUser'));
    if (!currentUser || currentUser.role !== 'owner') { window.location.href = 'login.html'; }

    // ══════════════════════════════════════════════════
    // HOTELS
    // ══════════════════════════════════════════════════
    async function loadMyHotels() {
        const c = document.getElementById('myHotelsContainer');
        try {
            const res  = await fetch(`${API}/hotels/owner/${currentUser.id}`);
            const data = await res.json();
            if (!data.success || data.hotels.length === 0) {
                c.innerHTML = '<p class="empty">No hotels listed yet. Add one above!</p>'; return;
            }
            c.innerHTML = '';
            data.hotels.forEach(h => {
                c.innerHTML += `
                    <div class="item-row">
                        <div>
                            <h4>🏨 ${h.name}</h4>
                            <p>📍 ${h.city} &nbsp;|&nbsp; ₹${Number(h.price).toLocaleString()}/night</p>
                            <p style="color:#888;font-size:12px;">${h.description || ''}</p>
                        </div>
                        <button class="btn-del" onclick="deleteHotel(${h.id})">Remove</button>
                    </div>`;
            });
        } catch(e) { c.innerHTML = '<p class="empty" style="color:red">❌ Cannot reach server.</p>'; }
    }

    async function addHotel() {
        const name  = document.getElementById('hotelName').value.trim();
        const city  = document.getElementById('hotelCity').value;
        const price = document.getElementById('hotelPrice').value;
        const image = document.getElementById('hotelImage').value.trim();
        const desc  = document.getElementById('hotelDesc').value.trim();
        const msgEl = document.getElementById('hotelMsg');
        const btn   = document.getElementById('addHotelBtn');

        msgEl.className = 'form-msg';
        if (!name || !city || !price) { msgEl.className='form-msg err'; msgEl.innerText='Please fill Name, City and Price.'; return; }

        btn.disabled  = true;
        btn.innerHTML = '<span class="spinner"></span>Adding…';

        try {
            const res  = await fetch(`${API}/hotels/add`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ name, city, price, image:image||'p1.jpg', owner_id:currentUser.id, owner_email:currentUser.email, description:desc })
            });
            const data = await res.json();
            if (data.success) {
                msgEl.className='form-msg ok'; msgEl.innerText='✅ Hotel listed successfully!';
                document.getElementById('hotelName').value  = '';
                document.getElementById('hotelCity').value  = '';
                document.getElementById('hotelPrice').value = '';
                document.getElementById('hotelImage').value = '';
                document.getElementById('hotelDesc').value  = '';
                loadMyHotels();
            } else { msgEl.className='form-msg err'; msgEl.innerText=data.message||'Failed.'; }
        } catch(e) { msgEl.className='form-msg err'; msgEl.innerText='❌ Cannot reach server.'; }
        finally { btn.disabled=false; btn.innerHTML='+ List Hotel'; }
    }

    async function deleteHotel(id) {
        if (!confirm('Remove this hotel listing?')) return;
        try {
            const res  = await fetch(`${API}/hotels/${id}`, { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({owner_id:currentUser.id}) });
            const data = await res.json();
            if (data.success) loadMyHotels();
            else alert(data.message || 'Could not delete.');
        } catch(e) { alert('Server error.'); }
    }

    // ══════════════════════════════════════════════════
    // TRIPS
    // ══════════════════════════════════════════════════
    async function loadMyTrips() {
        const c = document.getElementById('myTripsContainer');
        try {
            const res  = await fetch(`${API}/trips/my?organizer_id=${currentUser.id}`);
            const data = await res.json();
            if (!data.success || data.trips.length === 0) {
                c.innerHTML = '<p class="empty">No packages yet. Add one above!</p>'; return;
            }
            c.innerHTML = '';
            data.trips.forEach(t => {
                c.innerHTML += `
                    <div class="item-row">
                        <div>
                            <h4>🎒 ${t.title}</h4>
                            <p>📍 ${t.location} &nbsp;|&nbsp; ₹${Number(t.price).toLocaleString()}</p>
                        </div>
                        <button class="btn-del" onclick="deleteTrip(${t.id})">Delete</button>
                    </div>`;
            });
        } catch(e) { c.innerHTML = '<p class="empty" style="color:red">❌ Cannot reach server.</p>'; }
    }

    async function addTrip() {
        const title    = document.getElementById('tripTitle').value.trim();
        const location = document.getElementById('tripLocation').value.trim();
        const price    = document.getElementById('tripPrice').value;
        const image    = document.getElementById('tripImage').value.trim();
        const msgEl    = document.getElementById('tripMsg');
        const btn      = document.getElementById('addTripBtn');

        msgEl.className = 'form-msg';
        if (!title || !location || !price) { msgEl.className='form-msg err'; msgEl.innerText='Please fill Title, Location and Price.'; return; }

        btn.disabled  = true;
        btn.innerHTML = '<span class="spinner"></span>Adding…';

        try {
            const res  = await fetch(`${API}/trips/add`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({title,location,price,image,organizer_id:currentUser.id}) });
            const data = await res.json();
            if (data.success) {
                msgEl.className='form-msg ok'; msgEl.innerText='✅ Package added!';
                document.getElementById('tripTitle').value=''; document.getElementById('tripLocation').value='';
                document.getElementById('tripPrice').value=''; document.getElementById('tripImage').value='';
                loadMyTrips();
            } else { msgEl.className='form-msg err'; msgEl.innerText=data.message||'Failed.'; }
        } catch(e) { msgEl.className='form-msg err'; msgEl.innerText='❌ Cannot reach server.'; }
        finally { btn.disabled=false; btn.innerHTML='+ Add Package'; }
    }

    async function deleteTrip(id) {
        if (!confirm('Delete this package?')) return;
        try {
            const res  = await fetch(`${API}/trips/${id}`, { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({organizer_id:currentUser.id}) });
            const data = await res.json();
            if (data.success) loadMyTrips();
            else alert(data.message || 'Could not delete.');
        } catch(e) { alert('Server error.'); }
    }

    // ══════════════════════════════════════════════════
    // BOOKING REQUESTS (with counter-offer)
    // ══════════════════════════════════════════════════
    async function loadRequests() {
        const c = document.getElementById('requestsContainer');
        try {
            const res  = await fetch(`${API}/bookings/owner/${encodeURIComponent(currentUser.email)}`);
            const data = await res.json();
            if (!data.success || data.bookings.length === 0) {
                c.innerHTML = '<p class="empty">No booking requests yet.</p>'; return;
            }
            c.innerHTML = '';
            data.bookings.forEach(b => {
                const statusKey = (b.status||'').replace(/[^a-zA-Z]/g,'');
                const nights    = Math.ceil((new Date(b.checkout)-new Date(b.checkin))/(86400000));
                const isCounter = b.status === 'Counter Offered';
                const isPaid    = b.status === 'Paid & Confirmed';
                const isActive  = b.status === 'Pending' || isCounter;

                let extraInfo = '';
                if (isCounter) {
                    extraInfo = `<p style="color:#7c3aed;font-weight:bold;">Your counter: ₹${Number(b.counter_offer).toLocaleString()}/night${b.counter_note ? ' — "'+b.counter_note+'"' : ''}</p>`;
                }
                if (isPaid) {
                    extraInfo = `<p style="color:#1e40af;font-weight:bold;">✅ Payment Ref: ${b.payment_ref || '—'}</p>`;
                }

                let actionBtns = '';
                if (isActive) {
                    actionBtns = `
                        <button class="btn-accept" onclick="updateStatus(${b.id},'Accepted')">✅ Accept</button>
                        <button class="btn-reject" onclick="updateStatus(${b.id},'Rejected')">❌ Reject</button>
                        <button class="btn-counter" onclick="toggleCounter(${b.id})">💬 Counter Offer</button>
                    `;
                }

                c.innerHTML += `
                    <div class="card" id="req-${b.id}">
                        <h4>${b.property_name} — <span class="status ${statusKey}">${b.status}</span></h4>
                        <p>👤 Guest: <strong>${b.user_name || 'User #'+b.user_id}</strong> | 📍 ${b.city}</p>
                        <p>📅 ${b.checkin} → ${b.checkout} (${nights} night${nights>1?'s':''})</p>
                        <p>💰 Listed: ₹${Number(b.original_price).toLocaleString()} &nbsp;|&nbsp;
                           Offered: <strong>₹${Number(b.offered_price).toLocaleString()}</strong>/night</p>
                        ${extraInfo}
                        <div class="action-btns">${actionBtns}</div>

                        <!-- Counter-offer inline panel -->
                        <div class="counter-panel" id="cpanel-${b.id}">
                            <label>Your Counter Price (₹/night)</label>
                            <input type="number" id="cprice-${b.id}" placeholder="e.g. 3800" value="${b.original_price}">
                            <label style="margin-top:8px;">Note to guest (optional)</label>
                            <textarea id="cnote-${b.id}" placeholder="e.g. Best we can do for this season!"></textarea>
                            <button class="counter-send-btn" onclick="sendCounter(${b.id})">Send Counter Offer</button>
                        </div>
                    </div>`;
            });
        } catch(e) { c.innerHTML = '<p class="empty" style="color:red">❌ Cannot reach server.</p>'; }
    }

    async function updateStatus(id, status) {
        try {
            const res  = await fetch(`${API}/bookings/hotel/${id}/status`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({status}) });
            const data = await res.json();
            if (data.success) loadRequests();
            else alert(data.message||'Error.');
        } catch(e) { alert('Server error.'); }
    }

    function toggleCounter(id) {
        const panel = document.getElementById(`cpanel-${id}`);
        panel.classList.toggle('show');
    }

    async function sendCounter(id) {
        const price = document.getElementById(`cprice-${id}`).value;
        const note  = document.getElementById(`cnote-${id}`).value.trim();
        if (!price) { alert('Please enter a counter price.'); return; }
        try {
            const res  = await fetch(`${API}/bookings/hotel/${id}/status`, {
                method:'PATCH', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({ status:'Counter Offered', counter_offer:price, counter_note:note })
            });
            const data = await res.json();
            if (data.success) { alert('✅ Counter offer sent to guest!'); loadRequests(); }
            else alert(data.message||'Error.');
        } catch(e) { alert('Server error.'); }
    }

    function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

    // Init
    loadMyHotels();
    loadMyTrips();
    loadRequests();
</script>
</body>
</html>
